name: CI

on:
  push:
  pull_request:

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest
      - name: Unit tests
        run: pytest
      - name: Demo gate run
        run: |
          argate evaluate --spec examples/spec.yaml --results examples/results.json --output gate-report.json --markdown gate-report.md
